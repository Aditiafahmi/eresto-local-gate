services:
    laravel.test:
        build:
            context: './vendor/laravel/sail/runtimes/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - mysql
            - redis
    mysql:
        image: 'mysql:8.4'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
            MYSQL_EXTRA_OPTIONS: '${MYSQL_EXTRA_OPTIONS:-}'
        volumes:
            - 'sail-mysql:/var/lib/mysql'
            - './vendor/laravel/sail/database/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    mock-hikvision-entrance:
        profiles: ['mock']
        image: 'sail-8.5/app'
        entrypoint: php
        command: artisan serve --host=0.0.0.0 --port=8080 --no-reload
        user: '${WWWUSER:-1000}:${WWWGROUP:-1000}'
        ports:
            - '${FORWARD_MOCK_HIKVISION_ENTRANCE_PORT:-8091}:8080'
        environment:
            APP_ENV: local
            APP_DEBUG: 'false'
            APP_CONFIG_CACHE: /tmp/eresto-mock-hikvision-config.php
            ERESTO_MOCK_HIKVISION_SERVER_ENABLED: 'true'
            ERESTO_MOCK_HIKVISION_DEVICE_NAME: xgym_entrance
            LOG_CHANNEL: stderr
            SESSION_DRIVER: array
            CACHE_STORE: array
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        healthcheck:
            test: ['CMD', 'curl', '--fail', 'http://localhost:8080/__mock/hikvision/state']
            interval: 5s
            timeout: 3s
            retries: 5
    mock-hikvision-exit:
        profiles: ['mock']
        image: 'sail-8.5/app'
        entrypoint: php
        command: artisan serve --host=0.0.0.0 --port=8080 --no-reload
        user: '${WWWUSER:-1000}:${WWWGROUP:-1000}'
        ports:
            - '${FORWARD_MOCK_HIKVISION_EXIT_PORT:-8092}:8080'
        environment:
            APP_ENV: local
            APP_DEBUG: 'false'
            APP_CONFIG_CACHE: /tmp/eresto-mock-hikvision-config.php
            ERESTO_MOCK_HIKVISION_SERVER_ENABLED: 'true'
            ERESTO_MOCK_HIKVISION_DEVICE_NAME: xgym_exit
            LOG_CHANNEL: stderr
            SESSION_DRIVER: array
            CACHE_STORE: array
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        healthcheck:
            test: ['CMD', 'curl', '--fail', 'http://localhost:8080/__mock/hikvision/state']
            interval: 5s
            timeout: 3s
            retries: 5
networks:
    sail:
        driver: bridge
volumes:
    sail-mysql:
        driver: local
    sail-redis:
        driver: local
